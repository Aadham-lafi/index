<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Star Fiber</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-wrapper {
            min-height: 100vh;
            padding-top: 100px;
            padding-bottom: 60px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .dashboard-header h2 {
            font-size: 2rem;
            margin-bottom: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .stat-icon.active-users {
            background: rgba(37, 211, 102, 0.15);
            color: #25D366;
        }

        .stat-icon.inactive-users {
            background: rgba(255, 68, 68, 0.15);
            color: #ff4444;
        }

        .stat-icon.total-users {
            background: rgba(0, 243, 255, 0.15);
            color: var(--primary-color);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .admin-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 18px;
            color: #fff;
            flex: 1;
            min-width: 250px;
            font-family: var(--font-body);
            transition: all 0.3s ease;
        }

        .admin-input:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .filter-select {
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            min-width: 150px;
            font-family: var(--font-body);
            outline: none;
        }

        .customer-table {
            width: 100%;
            border-collapse: collapse;
        }

        .customer-table th,
        .customer-table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .customer-table th {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            background: rgba(255, 255, 255, 0.02);
        }

        .customer-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .customer-table tr:last-child td {
            border-bottom: none;
        }

        .cust-name {
            font-weight: 600;
            color: #fff;
            font-size: 1rem;
        }

        .cust-email {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .cust-plan {
            font-weight: 500;
            color: var(--primary-color);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(37, 211, 102, 0.12);
            color: #25D366;
            border: 1px solid rgba(37, 211, 102, 0.25);
        }

        .status-badge.inactive {
            background: rgba(255, 68, 68, 0.12);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.25);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--primary-color);
            color: black;
            border-color: var(--primary-color);
        }
    </style>
</head>

<body>
    <!-- Particle Background -->
    <canvas id="particles-js"></canvas>

    <!-- Navigation -->
    <nav class="glass-header">
        <div class="container nav-container">
            <a href="index.html" class="logo">Star<span class="highlight">Fiber</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="#" class="active">Admin Portal</a></li>
            </ul>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="btn btn-outline" style="padding:10px 20px;font-size:0.9rem;" onclick="logoutAdmin()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            <div class="mobile-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Admin Dashboard -->
    <div class="admin-wrapper container">
        <div class="dashboard-header">
            <h2>Customers <span class="highlight">Dashboard</span></h2>
            <button class="btn btn-primary" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh
                Data</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card glass-panel">
                <div class="stat-icon active-users"><i class="fas fa-user-check"></i></div>
                <div>
                    <div class="stat-value" id="statsActive">0</div>
                    <div class="stat-label">Active Customers</div>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon inactive-users"><i class="fas fa-user-times"></i></div>
                <div>
                    <div class="stat-value" id="statsInactive">0</div>
                    <div class="stat-label">Inactive / Expired</div>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon total-users"><i class="fas fa-users"></i></div>
                <div>
                    <div class="stat-value" id="statsTotal">0</div>
                    <div class="stat-label">Total Customers</div>
                </div>
            </div>
        </div>

        <div class="glass-panel" style="padding: 24px;">
            <div class="controls">
                <input type="text" id="searchInput" class="admin-input"
                    placeholder="Search by name, email, or mobile..." oninput="filterTable()">
                <select id="statusFilter" class="filter-select" onchange="filterTable()">
                    <option value="all">All Status</option>
                    <option value="active">Active Only</option>
                    <option value="inactive">Inactive Only</option>
                </select>
            </div>

            <div style="overflow-x: auto;">
                <table class="customer-table" id="customersTable">
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Mobile</th>
                            <th>Area</th>
                            <th>Plan</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Rendered by JS -->
                    </tbody>
                </table>
            </div>

            <div id="loadingState" style="text-align: center; padding: 40px; color: var(--text-muted);">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                <p>Loading customers data...</p>
            </div>
            <div id="emptyState" style="display: none; text-align: center; padding: 40px; color: var(--text-muted);">
                <i class="fas fa-search" style="font-size: 2rem; margin-bottom: 10px; opacity: 0.5;"></i>
                <p>No customers found matching your criteria.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Mock API Data for demonstration
        const mockCustomers = [
            { id: 1, name: "Karthik Raja", email: "karthik.r@example.com", mobile: "+91 9876543210", area: "B.P. Agraharam", plan: "Standard (100Mbps)", status: "active", due: "15 Days" },
            { id: 2, name: "Priya S", email: "priya.s@gmail.com", mobile: "+91 8765432109", area: "Perumal Malai", plan: "Basic (50Mbps)", status: "active", due: "5 Days" },
            { id: 3, name: "Arun Kumar", email: "arun.gamer@yahoo.com", mobile: "+91 7654321098", area: "Erode City", plan: "Giga (300Mbps)", status: "inactive", due: "Expired" },
            { id: 4, name: "Lakshmi Narayanan", email: "lakshmi.n@hotmail.com", mobile: "+91 6543210987", area: "B.P. Agraharam", plan: "Starter (40Mbps)", status: "active", due: "21 Days" },
            { id: 5, name: "Suresh", email: "suresh123@example.com", mobile: "+91 9988776655", area: "Perumal Malai", plan: "Super (150Mbps)", status: "inactive", due: "Expired" }
        ];

        let customersData = [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchCustomers();
        });

        function fetchCustomers() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('tableBody').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';

            // Simulate API Network Delay
            setTimeout(() => {
                customersData = [...mockCustomers];
                renderTable(customersData);
                updateStats(customersData);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('tableBody').style.display = 'table-row-group';
            }, 800);
        }

        function updateStats(data) {
            const activeCount = data.filter(c => c.status === 'active').length;
            const inactiveCount = data.filter(c => c.status === 'inactive').length;

            document.getElementById('statsTotal').innerText = data.length;
            document.getElementById('statsActive').innerText = activeCount;
            document.getElementById('statsInactive').innerText = inactiveCount;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                return;
            } else {
                document.getElementById('emptyState').style.display = 'none';
            }

            data.forEach(cust => {
                const statusHtml = cust.status === 'active'
                    ? `<div class="status-badge active"><i class="fas fa-check-circle"></i> Active</div>`
                    : `<div class="status-badge inactive"><i class="fas fa-times-circle"></i> Expired</div>`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="cust-name">${cust.name}</div>
                        <div class="cust-email">${cust.email}</div>
                    </td>
                    <td>${cust.mobile}</td>
                    <td>${cust.area}</td>
                    <td class="cust-plan">${cust.plan}</td>
                    <td>
                        ${statusHtml}
                        <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">Due: ${cust.due}</div>
                    </td>
                    <td>
                        <button class="action-btn" title="View Details"><i class="fas fa-eye"></i></button>
                        <button class="action-btn" title="Send Reminder"><i class="fas fa-bell"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const statusType = document.getElementById('statusFilter').value;

            const filtered = customersData.filter(cust => {
                const matchesSearch = cust.name.toLowerCase().includes(search) ||
                    cust.email.toLowerCase().includes(search) ||
                    cust.mobile.toLowerCase().includes(search);

                const matchesStatus = statusType === 'all' || cust.status === statusType;

                return matchesSearch && matchesStatus;
            });

            renderTable(filtered);
        }

        function refreshData() {
            fetchCustomers();
        }

        function logoutAdmin() {
            alert('Logging out of Admin Portal...');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
